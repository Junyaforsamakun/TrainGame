<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<!-- iPhone対応 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>電車運転ゲーム</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87ceeb;
font-family:sans-serif;
}

canvas{
display:block;
background:#87ceeb;
}

/* ボタン */

button{
position:absolute;
bottom:20px;
padding:20px 45px;
font-size:24px;
touch-action:none;
border:none;
border-radius:12px;
}

#go{
left:20px;
background:#4CAF50;
color:white;
}

#back{
right:20px;
background:#f44336;
color:white;
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<button id="go">出発</button>
<button id="back">バック</button>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let trainX = 100
let speed = 0

let goPressed = false
let backPressed = false

const goBtn = document.getElementById("go")
const backBtn = document.getElementById("back")

/* ---------- 操作 ---------- */

function goStart(e){
if(e)e.preventDefault()
goPressed = true
}

function goEnd(){
goPressed = false
}

function backStart(e){
if(e)e.preventDefault()
backPressed = true
}

function backEnd(){
backPressed = false
}

/* iPhone */

goBtn.addEventListener("touchstart",goStart,{passive:false})
goBtn.addEventListener("touchend",goEnd)
goBtn.addEventListener("touchcancel",goEnd)

backBtn.addEventListener("touchstart",backStart,{passive:false})
backBtn.addEventListener("touchend",backEnd)
backBtn.addEventListener("touchcancel",backEnd)

/* PC */

goBtn.addEventListener("mousedown",goStart)
goBtn.addEventListener("mouseup",goEnd)
goBtn.addEventListener("mouseleave",goEnd)

backBtn.addEventListener("mousedown",backStart)
backBtn.addEventListener("mouseup",backEnd)
backBtn.addEventListener("mouseleave",backEnd)

/* ---------- 電車描画 ---------- */

function drawTrain(x,y){

/* 機関車 */

ctx.fillStyle="black"
ctx.fillRect(x,y-20,80,20)

ctx.fillRect(x+10,y-40,40,20)

/* 煙突 */

ctx.fillRect(x+55,y-50,10,10)

/* 車輪 */

ctx.beginPath()
ctx.arc(x+20,y,10,0,Math.PI*2)
ctx.arc(x+60,y,10,0,Math.PI*2)
ctx.fill()

/* 客車 */

for(let i=1;i<=3;i++){

let cx = x + i*100

ctx.fillStyle="blue"
ctx.fillRect(cx,y-20,80,20)

/* 窓 */

ctx.fillStyle="white"

for(let w=0;w<3;w++){

ctx.fillRect(cx+10+w*20,y-15,10,10)

}

/* 車輪 */

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(cx+20,y,10,0,Math.PI*2)
ctx.arc(cx+60,y,10,0,Math.PI*2)
ctx.fill()

}

}

/* ---------- 更新 ---------- */

function update(){

if(goPressed){
speed += 0.05
}

if(backPressed){
speed -= 0.05
}

/* 摩擦 */

speed *= 0.99

trainX += speed

}

/* ---------- 描画 ---------- */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

/* 地面 */

ctx.fillStyle="#4CAF50"
ctx.fillRect(0,canvas.height-100,canvas.width,100)

/* 線路 */

ctx.strokeStyle="brown"
ctx.lineWidth=4

for(let i=0;i<canvas.width;i+=40){

ctx.beginPath()
ctx.moveTo(i,canvas.height-60)
ctx.lineTo(i+20,canvas.height-60)
ctx.stroke()

}

/* レール */

ctx.beginPath()
ctx.moveTo(0,canvas.height-70)
ctx.lineTo(canvas.width,canvas.height-70)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(0,canvas.height-50)
ctx.lineTo(canvas.width,canvas.height-50)
ctx.stroke()

drawTrain(trainX,canvas.height-70)

}

/* ---------- ループ ---------- */

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

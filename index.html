<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>電車運転ゲーム</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87ceeb;
font-family:sans-serif;
}

canvas{
display:block;
}

/* 操作パネル */

#controls{
position:absolute;
bottom:10px;
left:0;
width:100%;
display:flex;
justify-content:space-evenly;
gap:10px;
padding:10px;
box-sizing:border-box;
}

#controls button{
flex:1;
font-size:28px;
padding:24px 0;
border:none;
border-radius:16px;
color:white;
touch-action:none;
}

#go{background:#4CAF50;}
#back{background:#f44336;}
#jump{background:#ff9800;}

</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="controls">
<button id="go">出発</button>
<button id="back">バック</button>
<button id="jump">ジャンプ</button>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)

/* 状態 */

let speed=0
let worldX=0

let trainY=0
let jumpVelocity=0
let onGround=true

let goPressed=false
let backPressed=false

/* ボタン */

const goBtn=document.getElementById("go")
const backBtn=document.getElementById("back")
const jumpBtn=document.getElementById("jump")

function goStart(e){if(e)e.preventDefault();goPressed=true}
function goEnd(){goPressed=false}

function backStart(e){if(e)e.preventDefault();backPressed=true}
function backEnd(){backPressed=false}

function jumpStart(e){

if(e)e.preventDefault()

if(onGround){
jumpVelocity=-10
onGround=false
}

}

goBtn.addEventListener("touchstart",goStart,{passive:false})
goBtn.addEventListener("touchend",goEnd)

backBtn.addEventListener("touchstart",backStart,{passive:false})
backBtn.addEventListener("touchend",backEnd)

jumpBtn.addEventListener("touchstart",jumpStart,{passive:false})

goBtn.addEventListener("mousedown",goStart)
goBtn.addEventListener("mouseup",goEnd)

backBtn.addEventListener("mousedown",backStart)
backBtn.addEventListener("mouseup",backEnd)

jumpBtn.addEventListener("mousedown",jumpStart)

/* 地形 */

let segments=[]

function createSegment(x){

let r=Math.random()

if(r<0.5) return {x,type:"flat"}
if(r<0.7) return {x,type:"uphill"}
if(r<0.85) return {x,type:"downhill"}

return {x,type:"bridge"}

}

for(let i=0;i<30;i++){
segments.push(createSegment(i*300))
}

/* 背景オブジェクト */

let objects=[]

function createObject(x){

let r=Math.random()

if(r<0.2)return{x,type:"house"}
if(r<0.4)return{x,type:"building"}
if(r<0.6)return{x,type:"tree"}
if(r<0.8)return{x,type:"mountain"}

return{x,type:"grave"}

}

for(let i=0;i<40;i++){
objects.push(createObject(i*300))
}

/* 機関車 */

function drawTrain(x,y){

ctx.fillStyle="#222"
ctx.fillRect(x,y-20,70,20)

ctx.fillStyle="#333"
ctx.fillRect(x+45,y-40,35,20)

ctx.fillStyle="#111"
ctx.fillRect(x+10,y-40,10,15)

ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(x+70,y-10,4,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(x+15,y,8,0,Math.PI*2)
ctx.arc(x+40,y,8,0,Math.PI*2)
ctx.arc(x+65,y,8,0,Math.PI*2)
ctx.fill()

for(let i=1;i<=3;i++){

let cx=x+i*90

ctx.fillStyle="#1e88e5"
ctx.fillRect(cx,y-18,65,18)

ctx.fillStyle="white"

for(let w=0;w<3;w++){
ctx.fillRect(cx+8+w*18,y-14,10,8)
}

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(cx+15,y,8,0,Math.PI*2)
ctx.arc(cx+50,y,8,0,Math.PI*2)
ctx.fill()

}

}

/* 背景描画 */

function drawObject(obj,baseY){

let x=obj.x-worldX

switch(obj.type){

case"house":
ctx.fillStyle="brown"
ctx.fillRect(x,baseY-60,40,40)
break

case"building":
ctx.fillStyle="gray"
ctx.fillRect(x,baseY-100,50,100)
break

case"tree":
ctx.fillStyle="green"
ctx.beginPath()
ctx.arc(x+10,baseY-40,20,0,Math.PI*2)
ctx.fill()
ctx.fillStyle="brown"
ctx.fillRect(x+7,baseY-40,6,40)
break

case"mountain":
ctx.fillStyle="#556B2F"
ctx.beginPath()
ctx.moveTo(x-40,baseY)
ctx.lineTo(x+20,baseY-100)
ctx.lineTo(x+80,baseY)
ctx.fill()
break

case"grave":
ctx.fillStyle="darkgray"
ctx.fillRect(x,baseY-30,15,30)
break

}

}

/* 更新 */

function update(){

if(goPressed)speed+=0.02
if(backPressed)speed-=0.02

speed*=0.995

/* 坂による速度変化 */

let currentSegment=segments.find(s=>200>=s.x-worldX && 200<s.x-worldX+300)

if(currentSegment){

if(currentSegment.type==="uphill"){
speed*=0.98
}

if(currentSegment.type==="downhill"){
speed*=1.02
}

}

worldX+=speed*5

/* ジャンプ */

jumpVelocity+=0.6
trainY+=jumpVelocity

if(trainY>0){
trainY=0
jumpVelocity=0
onGround=true
}

/* 地形生成 */

let last=segments[segments.length-1]

if(last.x-worldX<canvas.width+500){
segments.push(createSegment(last.x+300))
}

if(segments[0].x-worldX<-500){
segments.shift()
}

/* オブジェクト生成 */

let lastObj=objects[objects.length-1]

if(lastObj.x-worldX<canvas.width+500){
objects.push(createObject(lastObj.x+300))
}

if(objects[0].x-worldX<-500){
objects.shift()
}

}

/* 描画 */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

let baseY=canvas.height-220

/* 谷＋橋 */

segments.forEach(seg=>{

let sx=seg.x-worldX

if(seg.type==="bridge"){

ctx.fillStyle="#3a5fcd"
ctx.fillRect(sx,baseY+20,300,200)

ctx.strokeStyle="black"
ctx.lineWidth=6

ctx.beginPath()
ctx.moveTo(sx,baseY)
ctx.lineTo(sx+300,baseY)
ctx.stroke()

}

})

/* 背景 */

objects.forEach(o=>{
drawObject(o,baseY)
})

/* レール */

ctx.strokeStyle="black"

ctx.beginPath()
ctx.moveTo(0,baseY-8)
ctx.lineTo(canvas.width,baseY-8)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(0,baseY+8)
ctx.lineTo(canvas.width,baseY+8)
ctx.stroke()

drawTrain(200,baseY+trainY)

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

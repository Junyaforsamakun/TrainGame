<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<style>
body{margin:0;overflow:hidden;background:black}
canvas{display:block}

#controls{
position:absolute;
bottom:10px;
width:100%;
display:flex;
gap:5px;
padding:10px;
box-sizing:border-box;
}

button{
flex:1;
padding:14px;
font-size:16px;
border:none;
border-radius:10px;
color:white;
}

#go{background:#4CAF50}
#back{background:#e53935}
#jump{background:#ff9800}
#beam{background:#00e5ff}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="controls">
<button id="back">←</button>
<button id="go">→</button>
<button id="jump">JUMP</button>
<button id="beam">WAVE</button>
</div>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=innerWidth
canvas.height=innerHeight
}
window.onresize=resize
resize()

/* ===== 状態 ===== */
let worldX=0,speed=0
let trainY=0,jumpV=0,jumpCount=0
let ghosts=[],beams=[],particles=[]
let baseHeight=canvas.height-200

/* ===== エフェクト ===== */
let shake=0
let flash=0

/* ===== 入力 ===== */
let goF=false,backF=false

go.onmousedown=()=>goF=true
go.onmouseup=()=>goF=false
go.ontouchstart=()=>goF=true
go.ontouchend=()=>goF=false

back.onmousedown=()=>backF=true
back.onmouseup=()=>backF=false
back.ontouchstart=()=>backF=true
back.ontouchend=()=>backF=false

jump.onclick=()=>{
if(jumpCount<2){
jumpV=-12
jumpCount++
}
}

/* ===== 波動砲発射 ===== */
beam.onclick=()=>{
beams.push({
x:worldX+200,
life:40,
phase:"charge"
})
shake=15
flash=0.6
}

/* ===== 爆発 ===== */
function explode(x,y){
for(let i=0;i<50;i++){
particles.push({
x,y,
vx:(Math.random()-0.5)*10,
vy:(Math.random()-0.5)*10,
life:40
})
}
}

/* ===== 蒸気機関車 ===== */
function drawTrain(x,y){

let dir=speed>=0?1:-1

ctx.save()

let angle=Math.atan2(
Math.sin((worldX+x+1)*0.01)*50 - Math.sin((worldX+x)*0.01)*50,
1
)

ctx.translate(x,y)
ctx.rotate(angle)
ctx.scale(dir,1)

ctx.fillStyle="#222"
ctx.beginPath()
ctx.arc(0,-25,25,0,Math.PI*2)
ctx.fill()

ctx.fillRect(-30,-25,80,30)

ctx.fillStyle="#333"
ctx.fillRect(30,-45,30,30)

ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(-25,-25,6,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="#111"
ctx.fillRect(-10,-55,10,20)

/* 煙 */
particles.push({
x:x-dir*10,
y:y-60,
vx:(Math.random()-0.5)*2,
vy:-2,
life:40,
smoke:true
})

/* 車輪 */
[-20,10,40].forEach(w=>{
ctx.beginPath()
ctx.fillStyle="black"
ctx.arc(w,0,10,0,Math.PI*2)
ctx.fill()
})

ctx.restore()
}

/* ===== 更新 ===== */
function update(){

if(goF)speed+=0.05
if(backF)speed-=0.05
speed*=0.98
worldX+=speed*5

jumpV+=0.6
trainY+=jumpV
if(trainY>0){trainY=0;jumpV=0;jumpCount=0}

/* 敵 */
if(Math.random()<0.02){
ghosts.push({x:worldX+canvas.width+200})
}

/* ビーム処理 */
beams.forEach(b=>{
b.life--

if(b.phase==="charge" && b.life<25){
b.phase="fire"
}

if(b.phase==="fire"){
ghosts.forEach(g=>{
if(Math.abs((g.x-worldX)-(b.x-worldX+400))<50){
explode(g.x,baseHeight)
g.hit=true
}
})
}
})

ghosts=ghosts.filter(g=>!g.hit)

/* パーティクル */
particles.forEach(p=>{
p.x+=p.vx
p.y+=p.vy
p.vy+=0.2
p.life--
})
particles=particles.filter(p=>p.life>0)

/* エフェクト減衰 */
shake*=0.9
flash*=0.85

}

/* ===== 描画 ===== */
function draw(){

ctx.save()

/* シェイク */
ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake)

/* 背景 */
let grad=ctx.createLinearGradient(0,0,0,canvas.height)
grad.addColorStop(0,"#1a0033")
grad.addColorStop(1,"#ff6600")
ctx.fillStyle=grad
ctx.fillRect(0,0,canvas.width,canvas.height)

/* 地面 */
ctx.strokeStyle="#654321"
ctx.beginPath()
for(let x=0;x<canvas.width;x+=10){
let wx=worldX+x
let y=baseHeight+Math.sin(wx*0.01)*50
ctx.lineTo(x,y)
}
ctx.stroke()

/* 敵 */
ghosts.forEach(g=>{
ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(g.x-worldX,baseHeight-20,15,0,Math.PI*2)
ctx.fill()
})

/* 電車 */
let trainX=200
let trainYPos=baseHeight+Math.sin((worldX+trainX)*0.01)*50+trainY
drawTrain(trainX,trainYPos)

/* ===== 波動砲描画 ===== */
beams.forEach(b=>{

let startX=trainX
let startY=trainYPos-20
let endX=b.x-worldX+400

if(b.phase==="charge"){
/* チャージ球 */
ctx.fillStyle="cyan"
ctx.beginPath()
ctx.arc(startX,startY,20+Math.sin(b.life)*5,0,Math.PI*2)
ctx.fill()
}else{

let width=60+Math.sin(b.life*0.3)*15

/* オーラ */
for(let i=0;i<4;i++){
ctx.strokeStyle="rgba(0,255,255,"+(0.3-i*0.07)+")"
ctx.lineWidth=width+i*20
ctx.beginPath()
ctx.moveTo(startX,startY)
ctx.lineTo(endX,startY+Math.sin(worldX*0.2)*5)
ctx.stroke()
}

/* コア */
ctx.strokeStyle="white"
ctx.lineWidth=width*0.3
ctx.beginPath()
ctx.moveTo(startX,startY)
ctx.lineTo(endX,startY)
ctx.stroke()

}
})

/* パーティクル */
particles.forEach(p=>{
if(p.smoke){
ctx.fillStyle="rgba(200,200,200,"+(p.life/40)+")"
ctx.beginPath()
ctx.arc(p.x-worldX,p.y,8,0,Math.PI*2)
ctx.fill()
}else{
ctx.fillStyle="orange"
ctx.fillRect(p.x-worldX,p.y,4,4)
}
})

ctx.restore()

/* フラッシュ */
if(flash>0){
ctx.fillStyle="rgba(255,255,255,"+flash+")"
ctx.fillRect(0,0,canvas.width,canvas.height)
}
}

/* ループ */
function loop(){
update()
draw()
requestAnimationFrame(loop)
}
loop()
</script>

</body>
</html>

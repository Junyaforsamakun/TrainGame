<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電車ゲーム</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
}

canvas{
display:block;
}

#controls{
position:absolute;
bottom:10px;
width:100%;
display:flex;
justify-content:space-around;
}

#controls button{
flex:1;
margin:6px;
font-size:28px;
padding:22px;
border-radius:12px;
border:none;
color:white;
}

#go{background:#4CAF50}
#back{background:#f44336}
#jump{background:#ff9800}

</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="controls">
<button id="back">バック</button>
<button id="go">出発</button>
<button id="jump">ジャンプ</button>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)

/* 操作 */

let go=false
let back=false

document.getElementById("go").ontouchstart=()=>go=true
document.getElementById("go").ontouchend=()=>go=false

document.getElementById("back").ontouchstart=()=>back=true
document.getElementById("back").ontouchend=()=>back=false

document.getElementById("go").onmousedown=()=>go=true
document.getElementById("go").onmouseup=()=>go=false

document.getElementById("back").onmousedown=()=>back=true
document.getElementById("back").onmouseup=()=>back=false

/* ジャンプ */

let trainY=0
let jumpV=0
let onGround=true

document.getElementById("jump").ontouchstart=()=>{
if(onGround){
jumpV=-12
onGround=false
}
}

document.getElementById("jump").onmousedown=()=>{
if(onGround){
jumpV=-12
onGround=false
}
}

/* ワールド */

let speed=0
let worldX=0

let baseHeight=canvas.height-220

/* セグメント */

let segments=[]

function createSegment(x,lastHeight){

let type="flat"
let r=Math.random()

if(r<0.2) type="up"
else if(r<0.4) type="down"
else if(r<0.5) type="bridge"

let height=lastHeight

if(type=="up") height-=40
if(type=="down") height+=40

return{
x,
type,
height
}

}

segments.push({x:0,type:"flat",height:baseHeight})

for(let i=1;i<30;i++){
segments.push(createSegment(i*300,segments[i-1].height))
}

/* オブジェクト */

let objects=[]
const types=["tree","house","building","mountain","grave"]

function createObject(x){
return{
x,
type:types[Math.floor(Math.random()*types.length)]
}
}

for(let i=0;i<40;i++){
objects.push(createObject(i*300))
}

/* 電車 */

function drawTrain(x,y){

ctx.fillStyle="#222"

/* 機関車 */

ctx.fillRect(x-70,y-20,70,20)
ctx.fillRect(x-40,y-40,40,20)
ctx.fillRect(x-60,y-45,10,10)

ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(x,y-10,4,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(x-55,y,8,0,Math.PI*2)
ctx.arc(x-30,y,8,0,Math.PI*2)
ctx.arc(x-10,y,8,0,Math.PI*2)
ctx.fill()

/* 客車 */

for(let i=1;i<=3;i++){

let cx=x+i*90

ctx.fillStyle="#1976d2"
ctx.fillRect(cx,y-18,65,18)

ctx.fillStyle="white"

for(let w=0;w<3;w++){
ctx.fillRect(cx+8+w*18,y-14,10,8)
}

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(cx+15,y,8,0,Math.PI*2)
ctx.arc(cx+50,y,8,0,Math.PI*2)
ctx.fill()

}

}

/* 背景 */

function drawSky(){

let grad=ctx.createLinearGradient(0,0,0,canvas.height)

grad.addColorStop(0,"#6ec6ff")
grad.addColorStop(1,"#e3f2fd")

ctx.fillStyle=grad
ctx.fillRect(0,0,canvas.width,canvas.height)

}

/* 更新 */

function update(){

if(go) speed+=0.03
if(back) speed-=0.03

speed*=0.99

worldX+=speed*5

/* ジャンプ */

jumpV+=0.6
trainY+=jumpV

if(trainY>0){
trainY=0
jumpV=0
onGround=true
}

/* セグメント生成 */

let last=segments[segments.length-1]

if(last.x-worldX<canvas.width+400){
segments.push(createSegment(last.x+300,last.height))
}

if(segments[0].x-worldX<-400){
segments.shift()
}

}

/* 線路描画 */

function drawTrack(){

ctx.lineWidth=6
ctx.strokeStyle="black"

ctx.beginPath()

segments.forEach((seg,i)=>{

let x=seg.x-worldX
let y=seg.height

if(i==0){
ctx.moveTo(x,y)
}else{
ctx.lineTo(x,y)
}

})

ctx.stroke()

}

function drawObjects(){

objects.forEach(o=>{

let x=o.x-worldX
let y=baseHeight

switch(o.type){

case"tree":
ctx.fillStyle="green"
ctx.beginPath()
ctx.arc(x,y-40,20,0,Math.PI*2)
ctx.fill()
ctx.fillStyle="brown"
ctx.fillRect(x-3,y-40,6,40)
break

case"house":
ctx.fillStyle="#8d6e63"
ctx.fillRect(x,y-50,40,50)
break

case"building":
ctx.fillStyle="gray"
ctx.fillRect(x,y-120,50,120)
break

case"mountain":
ctx.fillStyle="#607d8b"
ctx.beginPath()
ctx.moveTo(x-40,y)
ctx.lineTo(x+20,y-120)
ctx.lineTo(x+80,y)
ctx.fill()
break

case"grave":
ctx.fillStyle="darkgray"
ctx.fillRect(x,y-30,15,30)
break

}

})

}

/* 描画 */

function draw(){

drawSky()

drawObjects()

drawTrack()

drawTrain(200,segments[0].height+trainY)

}

/* ループ */

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>

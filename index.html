<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>電車運転ゲーム</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87ceeb;
font-family:sans-serif;
}

canvas{
display:block;
}

/* 操作パネル */

#controls{
position:absolute;
bottom:10px;
left:0;
width:100%;
display:flex;
justify-content:space-evenly;
gap:10px;
padding:10px;
box-sizing:border-box;
}

/* 巨大ボタン */

#controls button{
flex:1;
font-size:28px;
padding:24px 0;
border:none;
border-radius:16px;
color:white;
touch-action:none;
}

#go{
background:#4CAF50;
}

#back{
background:#f44336;
}

#jump{
background:#ff9800;
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="controls">
<button id="go">出発</button>
<button id="back">バック</button>
<button id="jump">ジャンプ</button>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()

/* 画面回転対応 */

window.addEventListener("resize",resize)

/* 状態 */

let speed=0
let worldX=0

let trainY=0
let jumpVelocity=0
let onGround=true

let goPressed=false
let backPressed=false

/* ボタン */

const goBtn=document.getElementById("go")
const backBtn=document.getElementById("back")
const jumpBtn=document.getElementById("jump")

/* 操作 */

function goStart(e){if(e)e.preventDefault();goPressed=true}
function goEnd(){goPressed=false}

function backStart(e){if(e)e.preventDefault();backPressed=true}
function backEnd(){backPressed=false}

function jumpStart(e){

if(e)e.preventDefault()

if(onGround){
jumpVelocity=-12
onGround=false
}

}

/* iPhone */

goBtn.addEventListener("touchstart",goStart,{passive:false})
goBtn.addEventListener("touchend",goEnd)

backBtn.addEventListener("touchstart",backStart,{passive:false})
backBtn.addEventListener("touchend",backEnd)

jumpBtn.addEventListener("touchstart",jumpStart,{passive:false})

/* PC */

goBtn.addEventListener("mousedown",goStart)
goBtn.addEventListener("mouseup",goEnd)

backBtn.addEventListener("mousedown",backStart)
backBtn.addEventListener("mouseup",backEnd)

jumpBtn.addEventListener("mousedown",jumpStart)

/* 地形 */

let segments=[]

function createSegment(x){

let r=Math.random()

if(r<0.6)return {x,type:"flat"}
if(r<0.8)return {x,type:"hill"}

return {x,type:"tunnel"}

}

/* 初期地形 */

for(let i=0;i<30;i++){
segments.push(createSegment(i*300))
}

/* 電車 */

function drawTrain(x,y){

ctx.fillStyle="black"
ctx.fillRect(x,y-20,80,20)

ctx.fillRect(x+10,y-40,40,20)

ctx.fillRect(x+55,y-50,10,10)

ctx.beginPath()
ctx.arc(x+20,y,10,0,Math.PI*2)
ctx.arc(x+60,y,10,0,Math.PI*2)
ctx.fill()

for(let i=1;i<=3;i++){

let cx=x+i*100

ctx.fillStyle="blue"
ctx.fillRect(cx,y-20,80,20)

ctx.fillStyle="white"

for(let w=0;w<3;w++){
ctx.fillRect(cx+10+w*20,y-15,10,10)
}

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(cx+20,y,10,0,Math.PI*2)
ctx.arc(cx+60,y,10,0,Math.PI*2)
ctx.fill()

}

}

/* 更新 */

function update(){

if(goPressed)speed+=0.02
if(backPressed)speed-=0.02

speed*=0.995

worldX+=speed*5

/* ジャンプ */

jumpVelocity+=0.6
trainY+=jumpVelocity

if(trainY>0){
trainY=0
jumpVelocity=0
onGround=true
}

/* 地形生成 */

let last=segments[segments.length-1]

if(last.x-worldX<canvas.width+500){
segments.push(createSegment(last.x+300))
}

/* 古い地形削除 */

if(segments.length>0 && segments[0].x-worldX<-500){
segments.shift()
}

}

/* 描画 */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

let baseY=canvas.height-140

/* 空 */

ctx.fillStyle="#87ceeb"
ctx.fillRect(0,0,canvas.width,canvas.height)

/* 地形 */

segments.forEach(seg=>{

let sx=seg.x-worldX

if(seg.type==="hill"){

ctx.fillStyle="#3e8e41"

ctx.beginPath()
ctx.moveTo(sx,baseY)
ctx.lineTo(sx+150,baseY-80)
ctx.lineTo(sx+300,baseY)
ctx.fill()

}

if(seg.type==="tunnel"){

ctx.fillStyle="#555"
ctx.fillRect(sx+80,baseY-120,140,120)

}

/* 枕木 */

ctx.strokeStyle="brown"
ctx.lineWidth=4

for(let i=0;i<300;i+=40){

ctx.beginPath()
ctx.moveTo(sx+i,baseY)
ctx.lineTo(sx+i+20,baseY)
ctx.stroke()

}

})

/* レール */

ctx.strokeStyle="black"

ctx.beginPath()
ctx.moveTo(0,baseY-10)
ctx.lineTo(canvas.width,baseY-10)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(0,baseY+10)
ctx.lineTo(canvas.width,baseY+10)
ctx.stroke()

drawTrain(200,baseY+trainY)

}

/* メインループ */

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  touch-action:none;
}
canvas{display:block;}
</style>
</head>

<body>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

/* ===== 画面 ===== */
let baseY=0
function resize(){
  canvas.width=innerWidth
  canvas.height=innerHeight
  baseY=canvas.height*0.7
}
resize()
window.addEventListener("resize",resize)

/* ===== 状態 ===== */
let worldX=0
let speed=0

let jumpV=0
let jumpY=0
let jumpCount=0

let ghosts=[]
let beams=[]
let particles=[]

let go=false
let back=false

/* ===== 入力 ===== */
canvas.addEventListener("touchstart",(e)=>{
  e.preventDefault()

  if(e.touches.length===2){
    beams.push({life:40})
    return
  }

  let t=e.touches[0]

  if(t.clientY < canvas.height*0.4){
    if(jumpCount<2){
      jumpV=-15
      jumpCount++
    }
  }else{
    if(t.clientX < canvas.width/2) back=true
    else go=true
  }

},{passive:false})

canvas.addEventListener("touchend",()=>{
  go=false
  back=false
})

/* pointer */
canvas.addEventListener("pointerdown",(e)=>{
  e.preventDefault()
  if(e.clientY < canvas.height*0.4){
    if(jumpCount<2){
      jumpV=-15
      jumpCount++
    }
  }else{
    if(e.clientX < canvas.width/2) back=true
    else go=true
  }
})
canvas.addEventListener("pointerup",()=>{
  go=false
  back=false
})

/* ===== 地形 ===== */
function ground(x){
  return baseY + Math.sin(x*0.01)*60
}

/* ===== 爆発 ===== */
function explode(x,y){
  for(let i=0;i<30;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*8,
      vy:(Math.random()-0.5)*8,
      life:40
    })
  }
}

/* ===== 更新 ===== */
function update(){

  if(go) speed+=0.05
  if(back) speed-=0.05
  speed*=0.98

  worldX+=speed*5

  /* ジャンプ */
  jumpV+=0.8
  jumpY+=jumpV

  if(jumpY>0){
    jumpY=0
    jumpV=0
    jumpCount=0
  }

  /* 幽霊 */
  if(Math.random()<0.02){
    ghosts.push({x:worldX+canvas.width+100})
  }

  /* 波動砲 */
  beams.forEach(b=>{
    b.life--
    ghosts.forEach(g=>{
      if(Math.abs((g.x-worldX)-200)<120){
        explode(g.x,ground(g.x))
        g.hit=true
      }
    })
  })

  ghosts=ghosts.filter(g=>!g.hit)
  beams=beams.filter(b=>b.life>0)

  /* パーティクル */
  particles.forEach(p=>{
    p.x+=p.vx
    p.y+=p.vy
    p.vy+=0.3
    p.life--
  })
  particles=particles.filter(p=>p.life>0)
}

/* ===== 描画 ===== */
function draw(){

  /* ハロウィン背景 */
  let g=ctx.createLinearGradient(0,0,0,canvas.height)
  g.addColorStop(0,"#220033")
  g.addColorStop(1,"#ff6600")
  ctx.fillStyle=g
  ctx.fillRect(0,0,canvas.width,canvas.height)

  /* 地面 */
  ctx.strokeStyle="#552200"
  ctx.beginPath()
  for(let x=0;x<canvas.width;x+=10){
    ctx.lineTo(x,ground(worldX+x))
  }
  ctx.stroke()

  /* 幽霊 */
  ghosts.forEach(g=>{
    ctx.fillStyle="white"
    ctx.beginPath()
    ctx.arc(g.x-worldX,ground(g.x)-20,15,0,Math.PI*2)
    ctx.fill()
  })

  /* 電車 */
  let tx=200
  let gy=ground(worldX+tx)

  let angle=Math.atan2(
    ground(worldX+tx+1)-gy,
    1
  )

  let ty=gy+jumpY

  ctx.save()
  ctx.translate(tx,ty)
  ctx.rotate(angle)

  ctx.fillStyle="#111"
  ctx.fillRect(-30,-30,60,30)
  ctx.fillRect(30,-40,30,30)

  ctx.fillRect(70,-25,50,25)
  ctx.fillRect(130,-25,50,25)

  [-20,10,40,80,110,150].forEach(w=>{
    ctx.beginPath()
    ctx.arc(w,0,10,0,Math.PI*2)
    ctx.fill()
  })

  ctx.restore()

  /* 波動砲 */
  beams.forEach(b=>{
    let sx=tx
    let sy=ty-20
    let ex=tx+600

    for(let i=0;i<4;i++){
      ctx.strokeStyle="rgba(0,255,255,"+(0.3-i*0.07)+")"
      ctx.lineWidth=60+i*20
      ctx.beginPath()
      ctx.moveTo(sx,sy)
      ctx.lineTo(ex,sy)
      ctx.stroke()
    }
  })

  /* 爆発 */
  particles.forEach(p=>{
    ctx.fillStyle="orange"
    ctx.fillRect(p.x-worldX,p.y,4,4)
  })
}

/* ===== ループ ===== */
function loop(){
  update()
  draw()
  requestAnimationFrame(loop)
}
loop()

</script>
</body>
</html>

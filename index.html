<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;overflow:hidden;background:black;}
canvas{display:block;}

#controls{
position:fixed;
bottom:0;
width:100%;
display:flex;
gap:8px;
padding:10px;
}

button{
flex:1;
padding:20px;
font-size:18px;
border:none;
border-radius:10px;
color:white;
}

#go{background:green}
#back{background:red}
#jump{background:orange}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="controls">
<button id="back">←</button>
<button id="go">→</button>
<button id="jump">JUMP</button>
</div>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const go=document.getElementById("go")
const back=document.getElementById("back")
const jumpBtn=document.getElementById("jump")

let baseHeight

function resize(){
 canvas.width=innerWidth
 canvas.height=innerHeight
 baseHeight=canvas.height*0.7
}
resize()
window.onresize=resize

/* 状態 */
let worldX=0,speed=0
let trainY=0,jumpV=0,jumpCount=0

/* 入力 */
let goF=false,backF=false

function bind(el,down,up){
 el.addEventListener("pointerdown",e=>{e.preventDefault();down()})
 el.addEventListener("pointerup",up)
 el.addEventListener("pointerleave",up)
}

bind(go,()=>goF=true,()=>goF=false)
bind(back,()=>backF=true,()=>backF=false)

jumpBtn.addEventListener("pointerdown",()=>{
 if(jumpCount<2){
  jumpV=-12
  jumpCount++
 }
})

/* 地面 */
function groundY(x){
 return baseHeight+Math.sin(x*0.01)*50
}

/* 更新 */
function update(){
 if(goF)speed+=0.05
 if(backF)speed-=0.05
 speed*=0.98

 worldX+=speed*5

 jumpV+=0.6
 trainY+=jumpV

 if(trainY>0){
  trainY=0
  jumpV=0
  jumpCount=0
 }
}

/* 描画 */
function draw(){

 /* 背景 */
 let grad=ctx.createLinearGradient(0,0,0,canvas.height)
 grad.addColorStop(0,"#1a0033")
 grad.addColorStop(1,"#ff5500")
 ctx.fillStyle=grad
 ctx.fillRect(0,0,canvas.width,canvas.height)

 /* 地面 */
 ctx.strokeStyle="#654321"
 ctx.beginPath()
 for(let x=0;x<canvas.width;x+=10){
  let wx=worldX+x
  ctx.lineTo(x,groundY(wx))
 }
 ctx.stroke()

 /* 電車 */
 let tx=200
 let ty=groundY(worldX+tx)+trainY

 let angle=Math.atan2(
  groundY(worldX+tx+1)-groundY(worldX+tx),
  1
 )

 ctx.save()
 ctx.translate(tx,ty)
 ctx.rotate(angle)

 /* 機関車 */
 ctx.fillStyle="#222"
 ctx.fillRect(-30,-30,60,30)
 ctx.fillRect(30,-40,30,30)

 /* 車両 */
 ctx.fillRect(70,-25,50,25)
 ctx.fillRect(130,-25,50,25)

 /* 車輪 */
 [-20,10,40,80,110,150].forEach(w=>{
  ctx.beginPath()
  ctx.arc(w,0,10,0,Math.PI*2)
  ctx.fill()
 })

 ctx.restore()
}

/* ループ */
function loop(){
 update()
 draw()
 requestAnimationFrame(loop)
}
loop()

</script>

</body>
</html>

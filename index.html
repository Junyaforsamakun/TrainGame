<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<style>
body{margin:0;overflow:hidden;background:black;font-family:sans-serif}
canvas{display:block}

#ui{
position:absolute;
top:env(safe-area-inset-top,10px);
left:10px;
color:white;
z-index:10;
}

#controls{
position:absolute;
bottom:env(safe-area-inset-bottom,10px);
width:100%;
display:flex;
gap:6px;
padding:10px;
box-sizing:border-box;
z-index:10;
}

button{
flex:1;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
}

#go{background:#4CAF50}
#back{background:#e53935}
#jump{background:#ff9800}
#beam{background:#00e5ff}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
SCORE:<span id="score">0</span>
</div>

<div id="controls">
<button id="back">←</button>
<button id="go">→</button>
<button id="jump">JUMP</button>
<button id="beam">BEAM</button>
</div>

<script>
const canvas=game
const ctx=canvas.getContext("2d")

let isPortrait=true

function resize(){
canvas.width=innerWidth
canvas.height=innerHeight
isPortrait=innerHeight>innerWidth
adjustUI()
}
window.onresize=resize
resize()

function adjustUI(){
const controls=document.getElementById("controls")
if(isPortrait){
controls.style.flexDirection="column"
}else{
controls.style.flexDirection="row"
}
}

/* ===== 状態 ===== */
let state="TITLE"
let worldX=0,speed=0
let trainY=0,jumpV=0,jumpCount=0
let ghosts=[],beams=[],particles=[]
let score=0
let baseHeight

function init(){
worldX=0
speed=0
trainY=0
jumpV=0
jumpCount=0
ghosts=[]
beams=[]
particles=[]
score=0
baseHeight=canvas.height-200
}

/* ===== 入力 ===== */
let goF=false,backF=false
go.onmousedown=()=>goF=true
go.onmouseup=()=>goF=false
back.onmousedown=()=>backF=true
back.onmouseup=()=>backF=false

jump.onclick=()=>{
if(state==="PLAY"&&jumpCount<2){
jumpV=-12
jumpCount++
}
}

beam.onclick=()=>{
if(state==="PLAY"){
beams.push({x:worldX+200,life:15})
}
}

/* ===== 爆発 ===== */
function explode(x,y){
for(let i=0;i<30;i++){
particles.push({
x,y,
vx:(Math.random()-0.5)*8,
vy:(Math.random()-0.5)*8,
life:30
})
}
}

/* ===== 更新 ===== */
function update(){

if(state!=="PLAY")return

if(goF)speed+=0.05
if(backF)speed-=0.05
speed*=0.98
worldX+=speed*5

/* 坂道（sin波） */
let slope=Math.sin(worldX*0.01)*50
let ground=baseHeight+slope

jumpV+=0.6
trainY+=jumpV

if(trainY>0){
trainY=0
jumpV=0
jumpCount=0
}

/* 幽霊 */
if(Math.random()<0.02){
ghosts.push({x:worldX+canvas.width+200})
}

ghosts.forEach(g=>{
g.x-=2
if(Math.abs((g.x-worldX)-200)<30 && trainY===0){
explode(g.x,ground)
}
})

/* ビーム */
beams.forEach(b=>{
let bx=b.x-worldX+400
ghosts.forEach(g=>{
if(Math.abs((g.x-worldX)-bx)<40){
g.hit=true
score+=10
explode(g.x,baseHeight)
}
})
})
ghosts=ghosts.filter(g=>!g.hit)

/* パーティクル */
particles.forEach(p=>{
p.x+=p.vx
p.y+=p.vy
p.vy+=0.2
p.life--
})
particles=particles.filter(p=>p.life>0)

beams.forEach(b=>b.life--)
beams=beams.filter(b=>b.life>0)

}

/* ===== 描画 ===== */
function draw(){

/* ハロウィン空 */
let grad=ctx.createLinearGradient(0,0,0,canvas.height)
grad.addColorStop(0,"#1a0033")
grad.addColorStop(1,"#ff6600")
ctx.fillStyle=grad
ctx.fillRect(0,0,canvas.width,canvas.height)

/* 地面ライン（坂） */
ctx.strokeStyle="#654321"
ctx.lineWidth=4
ctx.beginPath()

for(let x=0;x<canvas.width;x+=10){
let wx=worldX+x
let y=baseHeight+Math.sin(wx*0.01)*50
ctx.lineTo(x,y)
}
ctx.stroke()

/* トンネル */
ctx.fillStyle="#111"
ctx.fillRect(300,baseHeight-100,150,100)

/* 鉄橋 */
ctx.strokeStyle="gray"
ctx.beginPath()
ctx.moveTo(600,baseHeight)
ctx.lineTo(700,baseHeight-100)
ctx.stroke()

/* 幽霊 */
ghosts.forEach(g=>{
let x=g.x-worldX
let y=baseHeight-20
ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(x,y,15,0,Math.PI*2)
ctx.fill()
})

/* 電車（坂に沿う） */
let trainX=200
let trainYPos=baseHeight+Math.sin((worldX+trainX)*0.01)*50+trainY

ctx.fillStyle="#222"
ctx.fillRect(trainX,trainYPos-20,60,20)
ctx.fillStyle="red"
ctx.fillRect(trainX+60,trainYPos-30,30,30)

/* ビーム */
ctx.strokeStyle="cyan"
ctx.lineWidth=20
beams.forEach(b=>{
ctx.beginPath()
ctx.moveTo(trainX,trainYPos-20)
ctx.lineTo(b.x-worldX+400,trainYPos-20)
ctx.stroke()
})

/* パーティクル */
particles.forEach(p=>{
ctx.fillStyle="orange"
ctx.fillRect(p.x-worldX,p.y,4,4)
})

/* UI */
scoreEl.innerText=score

/* タイトル */
if(state==="TITLE"){
ctx.fillStyle="orange"
ctx.font="40px sans-serif"
ctx.fillText("HALLOWEEN TRAIN",40,200)
}

/* GAMEOVER */
if(state==="GAMEOVER"){
ctx.fillStyle="red"
ctx.font="40px sans-serif"
ctx.fillText("GAME OVER",40,200)
}
}

/* タップ */
canvas.onclick=()=>{
if(state==="TITLE"){
init()
state="PLAY"
}else if(state==="GAMEOVER"){
init()
state="PLAY"
}
}

/* ループ */
function loop(){
update()
draw()
requestAnimationFrame(loop)
}
loop()
</script>

</body>
</html>

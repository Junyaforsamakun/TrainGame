<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>でんしゃゲーム🚂</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #87CEEB; touch-action: none; user-select: none; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

/* ===== Audio ===== */
let audio = null;
function initAudio() { if (!audio) audio = new (window.AudioContext || window.webkitAudioContext)(); }

function beep(freq, type, dur, vol=0.3, delay=0) {
  if (!audio) return;
  const o = audio.createOscillator();
  const g = audio.createGain();
  o.connect(g); g.connect(audio.destination);
  o.type = type; o.frequency.value = freq;
  const t = audio.currentTime + delay;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur);
}

function playHorn() {
  beep(440, 'sawtooth', 0.15, 0.25);
  beep(550, 'sawtooth', 0.15, 0.25, 0.05);
  beep(440, 'sawtooth', 0.3,  0.2,  0.15);
}

function playChug() {
  beep(100, 'square', 0.08, 0.15);
  beep(80,  'square', 0.08, 0.12, 0.09);
}

function playCollect() {
  [523, 659, 784, 1047].forEach((f, i) => beep(f, 'sine', 0.2, 0.25, i * 0.07));
}

/* ===== State ===== */
let worldX = 0, speed = 0, wheelAngle = 0;
let pressing = false, hornCD = 0, chugTimer = 0, frame = 0;
let smoke = [], sparkles = [], score = 0;

/* ===== Scenery (deterministic from seed) ===== */
function seededRand(seed) {
  let s = seed ^ 0xdeadbeef;
  s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
  s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
  return ((s ^ (s >>> 16)) >>> 0) / 0xffffffff;
}

function groundY(x) {
  return canvas.height * 0.65 + Math.sin(x * 0.003) * 25 + Math.sin(x * 0.0071) * 12;
}

/* Clouds */
const CLOUDS = Array.from({length: 7}, (_, i) => ({
  sx: i * 600 + 100,
  y: canvas.height * 0.08 + seededRand(i * 7) * canvas.height * 0.22,
  r: 45 + seededRand(i * 13) * 55,
  spd: 0.25 + seededRand(i * 19) * 0.3,
}));

/* Items (stars / flowers) — world-space, recycled */
const ITEMS = Array.from({length: 25}, (_, i) => ({
  wx: 600 + i * 400 + seededRand(i * 31) * 200,
  type: seededRand(i * 41) < 0.5 ? 'star' : 'flower',
  done: false,
  phase: seededRand(i * 53) * Math.PI * 2,
}));

/* ===== Input ===== */
function onDown(e) {
  e.preventDefault(); initAudio(); pressing = true;
  if (hornCD <= 0) { playHorn(); hornCD = 90; }
}
function onUp() { pressing = false; }
canvas.addEventListener('pointerdown', onDown);
canvas.addEventListener('pointerup', onUp);
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });

/* ===== Drawing helpers ===== */
function drawCloud(x, y, r) {
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.arc(x + r * 0.75, y + r * 0.2, r * 0.68, 0, Math.PI * 2);
  ctx.arc(x - r * 0.65, y + r * 0.15, r * 0.6, 0, Math.PI * 2);
  ctx.fill();
}

function drawTree(x, y) {
  ctx.fillStyle = '#6D4C41';
  ctx.fillRect(x - 7, y - 28, 14, 28);
  ctx.fillStyle = '#388E3C';
  [[0, -55, 34], [-16, -44, 24], [16, -44, 24]].forEach(([dx, dy, r]) => {
    ctx.beginPath(); ctx.arc(x + dx, y + dy, r, 0, Math.PI * 2); ctx.fill();
  });
  ctx.fillStyle = '#43A047';
  ctx.beginPath(); ctx.arc(x, y - 60, 28, 0, Math.PI * 2); ctx.fill();
}

function drawFlower(x, y, size) {
  const colors = ['#E53935','#F57C00','#FDD835','#8E24AA','#1E88E5'];
  ctx.strokeStyle = '#2E7D32'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + size * 1.6); ctx.stroke();
  colors.forEach((c, i) => {
    const a = (i / 5) * Math.PI * 2;
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.ellipse(x + Math.cos(a) * size * 0.7, y + Math.sin(a) * size * 0.7 - size * 0.1,
      size * 0.5, size * 0.3, a, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.fillStyle = '#FDD835';
  ctx.beginPath(); ctx.arc(x, y - size * 0.1, size * 0.38, 0, Math.PI * 2); ctx.fill();
}

function drawStar(x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
    const rd = i % 2 === 0 ? r : r * 0.42;
    i === 0 ? ctx.moveTo(x + Math.cos(a) * rd, y + Math.sin(a) * rd)
            : ctx.lineTo(x + Math.cos(a) * rd, y + Math.sin(a) * rd);
  }
  ctx.closePath(); ctx.fill();
}

function drawWheel(wx, wy, r) {
  ctx.save(); ctx.translate(wx, wy); ctx.rotate(wheelAngle);
  ctx.fillStyle = '#37474F';
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#90A4AE';
  ctx.beginPath(); ctx.arc(0, 0, r * 0.62, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#37474F'; ctx.lineWidth = 2.5;
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r * 0.2, Math.sin(a) * r * 0.2);
    ctx.lineTo(Math.cos(a) * r * 0.62, Math.sin(a) * r * 0.62);
    ctx.stroke();
  }
  ctx.fillStyle = '#37474F';
  ctx.beginPath(); ctx.arc(0, 0, r * 0.2, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawTrain(cx, cy) {
  ctx.save(); ctx.translate(cx, cy);

  /* chimney */
  ctx.fillStyle = '#444';
  ctx.fillRect(-52, -70, 11, 22);
  ctx.beginPath(); ctx.arc(-46, -72, 9, 0, Math.PI * 2); ctx.fill();

  /* boiler */
  ctx.fillStyle = '#E53935';
  ctx.beginPath(); ctx.roundRect(-75, -52, 85, 48, 9); ctx.fill();
  ctx.fillStyle = '#EF9A9A';
  ctx.beginPath(); ctx.roundRect(-72, -49, 79, 10, 4); ctx.fill();

  /* dome */
  ctx.fillStyle = '#FF7043';
  ctx.beginPath(); ctx.ellipse(-32, -55, 19, 11, 0, Math.PI, 0); ctx.fill();

  /* cab */
  ctx.fillStyle = '#C62828';
  ctx.beginPath(); ctx.roundRect(8, -68, 52, 64, 6); ctx.fill();

  /* window */
  ctx.fillStyle = '#B3E5FC';
  ctx.beginPath(); ctx.roundRect(15, -60, 30, 22, 4); ctx.fill();
  ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(30, -60); ctx.lineTo(30, -38); ctx.stroke();

  /* underframe */
  ctx.fillStyle = '#78909C';
  ctx.fillRect(-78, -6, 148, 10);

  /* wheels */
  drawWheel(-50, 10, 15);
  drawWheel(-15, 10, 15);
  drawWheel(25, 10, 13);
  drawWheel(60, 10, 13);

  /* coupler */
  ctx.fillStyle = '#546E7A';
  ctx.fillRect(68, -2, 14, 6);

  /* headlight */
  ctx.fillStyle = '#FFEE58';
  ctx.beginPath(); ctx.arc(-76, -30, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,238,88,0.25)';
  ctx.beginPath(); ctx.arc(-76, -30, 22, 0, Math.PI * 2); ctx.fill();

  /* face */
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(-60, -26, 5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-40, -26, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-60, -25, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-40, -25, 3, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(-50, -16, 8, 0.1, Math.PI - 0.1); ctx.stroke();

  ctx.restore();
}

/* ===== Update ===== */
function update() {
  frame++;
  if (pressing) speed = Math.min(speed + 0.12, 6);
  else          speed = Math.max(speed - 0.06, 0);

  worldX += speed;
  wheelAngle += speed * 0.09;
  hornCD--;

  /* chug sound */
  if (speed > 0.8) {
    chugTimer--;
    if (chugTimer <= 0) { playChug(); chugTimer = Math.max(4, Math.floor(18 / speed)); }
  }

  /* smoke */
  if (speed > 0.5 && frame % 4 === 0) {
    smoke.push({ x: 200 - 46, y: groundY(worldX + 200) - 70,
      vx: -speed * 1.5 - 0.5 + (Math.random() - 0.5), vy: -1.2 - Math.random(),
      r: 7 + Math.random() * 6, life: 1 });
  }
  smoke.forEach(s => { s.x += s.vx; s.y += s.vy; s.r += 0.6; s.life -= 0.018; });
  smoke = smoke.filter(s => s.life > 0);

  /* sparkles */
  sparkles.forEach(s => { s.x += s.vx; s.y += s.vy; s.vy += 0.15; s.life -= 0.035; });
  sparkles = sparkles.filter(s => s.life > 0);

  /* clouds */
  CLOUDS.forEach(c => { c.sx -= c.spd; if (c.sx < -200) c.sx = canvas.width + 200; });

  /* item collection */
  ITEMS.forEach(item => {
    if (item.done) {
      if (item.wx < worldX - 200)
        { item.wx = worldX + canvas.width + 300 + Math.random() * 400; item.done = false; }
      return;
    }
    const sx = item.wx - worldX;
    if (Math.abs(sx - 200) < 65) {
      item.done = true; score++;
      playCollect();
      for (let i = 0; i < 10; i++)
        sparkles.push({ x: sx, y: groundY(item.wx) - 25,
          vx: (Math.random() - 0.5) * 7, vy: -3 - Math.random() * 3,
          life: 1, color: item.type === 'star' ? '#FFD600' : '#E91E63' });
    }
  });
}

/* ===== Draw ===== */
function draw() {
  const W = canvas.width, H = canvas.height;

  /* sky */
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.7);
  sky.addColorStop(0, '#42A5F5'); sky.addColorStop(1, '#E1F5FE');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  /* sun */
  ctx.fillStyle = '#FFD600';
  ctx.beginPath(); ctx.arc(W * 0.88, H * 0.1, 46, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,214,0,0.45)'; ctx.lineWidth = 3;
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(W * 0.88 + Math.cos(a) * 52, H * 0.1 + Math.sin(a) * 52);
    ctx.lineTo(W * 0.88 + Math.cos(a) * 72, H * 0.1 + Math.sin(a) * 72);
    ctx.stroke();
  }

  /* clouds */
  CLOUDS.forEach(c => drawCloud(c.sx, c.y, c.r));

  /* ground */
  ctx.fillStyle = '#66BB6A';
  ctx.beginPath(); ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 6) ctx.lineTo(x, groundY(worldX + x));
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();

  ctx.fillStyle = '#4CAF50';
  ctx.beginPath(); ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 6) ctx.lineTo(x, groundY(worldX + x) + 14);
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();

  /* rail */
  ctx.strokeStyle = '#8D6E63'; ctx.lineWidth = 7;
  ctx.beginPath();
  for (let x = 0; x <= W; x += 6) ctx.lineTo(x, groundY(worldX + x) + 3);
  ctx.stroke();

  /* ties */
  ctx.strokeStyle = '#6D4C41'; ctx.lineWidth = 4;
  const step = 28;
  for (let i = -2; i < W / step + 2; i++) {
    const rx = i * step - (worldX % step);
    const ry = groundY(worldX + rx);
    ctx.beginPath(); ctx.moveTo(rx - 13, ry - 1); ctx.lineTo(rx + 13, ry - 1); ctx.stroke();
  }

  /* trees — deterministic per-segment */
  const seg = 220;
  for (let i = -1; i < W / seg + 2; i++) {
    const base = (Math.floor(worldX / seg) + i) * seg;
    const offset = seededRand(base | 0) * 80 + 60;
    const wx = base + offset;
    const sx = wx - worldX;
    if (sx > -80 && sx < W + 80) drawTree(sx, groundY(wx));
  }

  /* items */
  ITEMS.forEach(item => {
    if (item.done) return;
    const sx = item.wx - worldX;
    if (sx < -60 || sx > W + 60) return;
    const gy = groundY(item.wx);
    const bob = Math.sin(frame * 0.06 + item.phase) * 5;
    if (item.type === 'star') drawStar(sx, gy - 28 + bob, 19, '#FFD600');
    else drawFlower(sx, gy - 12 + bob, 13);
  });

  /* smoke */
  smoke.forEach(s => {
    ctx.globalAlpha = s.life * 0.55;
    ctx.fillStyle = '#B0BEC5';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  /* sparkles */
  sparkles.forEach(s => {
    ctx.globalAlpha = s.life;
    drawStar(s.x, s.y, 6, s.color);
  });
  ctx.globalAlpha = 1;

  /* train */
  drawTrain(200, groundY(worldX + 200));

  /* score */
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.beginPath(); ctx.roundRect(10, 10, 170, 52, 12); ctx.fill();
  ctx.font = 'bold 30px sans-serif'; ctx.fillStyle = '#333';
  ctx.fillText('⭐ × ' + score, 22, 48);

  /* hint */
  if (frame < 220) {
    ctx.globalAlpha = Math.min(1, (220 - frame) / 50);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.roundRect(W/2-145, H-82, 290, 52, 26); ctx.fill();
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center'; ctx.fillText('タップで しゅっぱつ！🚂', W/2, H-48);
    ctx.textAlign = 'left'; ctx.globalAlpha = 1;
  }

  /* speed bar */
  const barW = Math.min(W * 0.4, 250);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.roundRect(W-barW-14, 14, barW, 22, 8); ctx.fill();
  ctx.fillStyle = speed > 4 ? '#FF5722' : speed > 2 ? '#FFB300' : '#66BB6A';
  ctx.beginPath(); ctx.roundRect(W-barW-14, 14, barW * (speed/6), 22, 8); ctx.fill();
  ctx.font = '14px sans-serif'; ctx.fillStyle = '#fff';
  ctx.textAlign = 'right'; ctx.fillText('スピード', W-16, 44); ctx.textAlign = 'left';
}

/* ===== Loop ===== */
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
